services:
  db:
    image: postgres:16-alpine
    container_name: ${APP_SLUG}_db_${APP_ENV}
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ${APP_SLUG}_backend_${APP_ENV}
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    depends_on:
      - db
    networks:
      - internal
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge"
      - "traefik.http.routers.${APP_SLUG}-api.rule=Host(`${APP_HOST}`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.${APP_SLUG}-api.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG}-api.tls=true"
      - "traefik.http.routers.${APP_SLUG}-api.tls.certresolver=le"
      - "traefik.http.routers.${APP_SLUG}-api.priority=100"
      - "traefik.http.services.${APP_SLUG}-api.loadbalancer.server.port=8000"
      - "traefik.http.routers.${APP_SLUG}-admin.rule=Host(`${APP_HOST}`) && PathPrefix(`/admin/`)"
      - "traefik.http.routers.${APP_SLUG}-admin.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG}-admin.tls=true"
      - "traefik.http.routers.${APP_SLUG}-admin.tls.certresolver=le"
      - "traefik.http.routers.${APP_SLUG}-admin.priority=100"
      - "traefik.http.services.${APP_SLUG}-admin.loadbalancer.server.port=8000"
      - "traefik.http.routers.${APP_SLUG}-static.rule=Host(`${APP_HOST}`) && PathPrefix(`/static/`)"
      - "traefik.http.routers.${APP_SLUG}-static.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG}-static.tls=true"
      - "traefik.http.routers.${APP_SLUG}-static.tls.certresolver=le"
      - "traefik.http.routers.${APP_SLUG}-static.priority=100"
      - "traefik.http.services.${APP_SLUG}-static.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
        APP_NAME: ${APP_NAME}
        VITE_SHOW_ADMIN_LINK: ${VITE_SHOW_ADMIN_LINK:-false}
        VITE_ADMIN_URL: ${VITE_ADMIN_URL:-/admin/}
    container_name: ${APP_SLUG}_frontend_${APP_ENV}
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    depends_on:
      - backend
    networks:
      - internal
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge"
      - "traefik.http.routers.${APP_SLUG}-frontend.rule=Host(`${APP_HOST}`) && !PathPrefix(`/api/`) && !PathPrefix(`/admin/`) && !PathPrefix(`/static/`)"
      - "traefik.http.routers.${APP_SLUG}-frontend.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG}-frontend.tls=true"
      - "traefik.http.routers.${APP_SLUG}-frontend.tls.certresolver=le"
      - "traefik.http.routers.${APP_SLUG}-frontend.priority=1"
      - "traefik.http.services.${APP_SLUG}-frontend.loadbalancer.server.port=80"

volumes:
  postgres_data:

networks:
  internal:
    name: ${APP_SLUG}_internal_${APP_ENV}
  edge:
    external: true
