services:
  db:
    image: postgres:16-alpine
    container_name: ${APP_SLUG}_db_${APP_ENV}
    env_file:
      - .env.dev
      - .env.local
    ports:
      - "${DEV_DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 40

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ${APP_SLUG}_backend_${APP_ENV}
    command: /app/entrypoint.sh python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env.dev
      - .env.local
    volumes:
      - ./backend:/app
    ports:
      - "${DEV_API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ${APP_SLUG}_frontend_${APP_ENV}
    command: npm run dev -- --host 0.0.0.0 --port 5173
    env_file:
      - .env.dev
      - .env.local
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${DEV_VITE_PORT}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
